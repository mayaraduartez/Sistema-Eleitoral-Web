<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Contato - Soluções Químicas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <div class="left">
    <span class="subtitle">CADASTRO DO ELEITOR</span>
    <h1>Faça o seu <br> Cadastro <br> Eleitoral Aqui</h1>
    <p>
      Participe da construção de um processo eleitoral mais organizado e eficiente!
    </p>
    <div class="imagem">
  <img src="img/Tribunal_Superior_Eleitoral.png" alt="Justiça Eleitoral">
</div>

    <div class="info">
      <p> Siga a conta da Justiça eleitoral nas redes socias; 
        <br></br>
      <a href="https://www.instagram.com/tsejusbr/" target="_blank">
  <i class="fa-brands fa-instagram"></i>
</a>
    </div>
  </div>

  <div class="right">
    <form>
      <input type="Nome" placeholder="Nome" required>
      <input type="CPF" placeholder="CPF" required>
      <input type="dataNasc" placeholder="Data de Nascimento" required>
      <input type="Titulo" placeholder="Titulo" required>
      <input type="Rua" placeholder="Rua" required>
      <input type="NumeroCasa" placeholder="Número da Casa" required>
      <input type="Bairro" placeholder="Bairo" required>
      <input type="Cidade" placeholder="Cidade" required>
      <input type="Estado" placeholder="Estado" required>

      <button type="submit" class="btn">Cadastre agora</button>
    </form>
  </div>

</div>

</body>
</html>
